<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Snap</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 20 20" fill="none">
        <polygon points="10,2 18,6.5 18,13.5 10,18 2,13.5 2,6.5" fill="none" stroke="#16a34a" stroke-width="1.5"/>
        <circle cx="10" cy="10" r="2.5" fill="#16a34a"/>
      </svg>
      Design<span>Snap</span>
    </div>
    <div class="header-actions">
      <button class="btn-lang" id="btn-lang">EN</button>
      <button class="btn-extract" id="btn-extract" data-i18n="extract">Extraire</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="colors" role="tab" data-i18n="tabColors">Couleurs</button>
    <button class="tab"        data-tab="typo"   role="tab" data-i18n="tabTypo">Typo</button>
    <button class="tab"        data-tab="radii"  role="tab" data-i18n="tabRadii">Radius & Shadows</button>
    <button class="tab"        data-tab="vars"   role="tab" data-i18n="tabVars">Variables CSS</button>
  </nav>

  <main class="content">

    <section id="tab-colors" class="tab-content active" role="tabpanel">
      <div class="empty-state" id="colors-empty">
        <div class="empty-icon">🎨</div>
        <p data-i18n-html="emptyPrompt">Cliquez sur <strong>Extraire</strong> pour analyser la page.</p>
      </div>
      <div class="colors-grid" id="colors-grid"></div>
      <div id="colors-toggle-wrap">
        <button class="btn-toggle" id="colors-toggle"></button>
      </div>
    </section>

    <section id="tab-typo" class="tab-content" role="tabpanel">
      <div class="empty-state" id="typo-empty">
        <div class="empty-icon">✏️</div>
        <p data-i18n-html="emptyPrompt">Cliquez sur <strong>Extraire</strong> pour analyser la page.</p>
      </div>
      <div id="typo-content"></div>
    </section>

    <section id="tab-radii" class="tab-content" role="tabpanel">
      <div class="empty-state" id="radii-empty">
        <div class="empty-icon">⬜</div>
        <p data-i18n-html="emptyPrompt">Cliquez sur <strong>Extraire</strong> pour analyser la page.</p>
      </div>
      <div id="radii-content"></div>
    </section>

    <section id="tab-vars" class="tab-content" role="tabpanel">
      <div class="empty-state" id="vars-empty">
        <div class="empty-icon">📦</div>
        <p data-i18n-html="emptyPrompt">Cliquez sur <strong>Extraire</strong> pour analyser la page.</p>
      </div>
      <div id="vars-content"></div>
    </section>

  </main>

  <footer class="footer">
    <button class="btn-copy" id="copy-json"     data-format="json">JSON</button>
    <button class="btn-copy" id="copy-css"      data-format="css">CSS Vars</button>
    <button class="btn-copy" id="copy-tailwind" data-format="tailwind">Tailwind</button>
    <button class="btn-copy" id="copy-figma"    data-format="figma">Figma</button>
  </footer>

  <div class="toolbar">
    <button class="btn-tool" id="btn-image-picker">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="5.5" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M1 10l4-3.5 3 2.5 2.5-2 4.5 4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M8 13v2M6.5 14.5l1.5 1.5 1.5-1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span data-i18n="btnMediaDl">Télécharger média</span>
    </button>
    <button class="btn-tool" id="btn-inspector">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M11.5 11.5l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span data-i18n="btnInspector">Inspecteur</span>
    </button>
  </div>

  <div class="statusbar" id="statusbar" data-i18n="statusReady">Prêt — cliquez sur Extraire</div>

  <script src="popup.js"></script>
</body>
</html>
